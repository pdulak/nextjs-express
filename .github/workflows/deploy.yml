name: Deploy to production

on:
  push:
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.MISC2026_SSH_HOST }}
          username: ${{ secrets.MISC2026_SSH_USER }}
          key: ${{ secrets.MISC2026_SSH_PRIVATE_KEY }}
          port: ${{ secrets.MISC2026_SSH_PORT }}
          command_timeout: 30m
          # If the Actions key uses `command=` in authorized_keys, sshd ignores this
          # script and runs only the forced command. Keep a non-empty script for the action.
          script: |
            echo "deploy: if using forced command in authorized_keys, the server runs that instead of this"
